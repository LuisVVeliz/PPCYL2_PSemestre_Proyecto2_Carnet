<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Información</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background-color: #f2f2f2;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        .sidebar {
            width: 220px;
            background-color: #2d3e50;
            color: white;
            padding: 20px;
        }

        .sidebar a {
            display: block;
            color: white;
            padding: 10px;
            text-decoration: none;
            margin-bottom: 5px;
        }

        .sidebar a:hover {
            background-color: #1abc9c;
        }

        .content {
            flex: 1;
            padding: 40px;
        }

        .info-card {
            width: 400px;
            background: white;
            border: 1px solid #ccc;
            padding: 20px;
        }

        .info-card p {
            margin: 10px 0;
        }

        .icon {
            font-size: 40px;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

<div class="container">

    <!-- Sidebar -->
    <div class="sidebar">
        <h3>Admin</h3>

        {% url 'cargar_xml' %}Cargar Archivo</a>
        {% url 'ver_usuarios' %}Ver Usuarios</a>
        {% url 'informacion' %}Información</a>
        {% url 'admin_panel' %}Volver</a>
    </div>

    <!-- Contenido principal -->
    <div class="content">
        <h2>INFORMACIÓN</h2>

        <div class="info-card">
            <div class="icon">ℹ️</div>

            <p><strong>Nombre completo:</strong></p>
            <p><strong>Carnet:</strong></p>
            <p>
                <strong>Link a la documentación:</strong><br>
                https://github.com/usuario/repositorio
            </p>
        </div>
    </div>

</div>

</body>
</html>
