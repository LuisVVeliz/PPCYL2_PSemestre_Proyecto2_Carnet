{% extends 'login/tutor/base_tutor.html' %}

{% block title %}Reporte Promedio de Notas{% endblock %}

{% block content %}

<h2>REVISIÓN DE REPORTE PROMEDIO DE NOTAS</h2>

<form method="post">
    {% csrf_token %}

    <div style="margin-bottom: 20px;">
        <label for="curso"><strong>Curso:</strong></label>

        <select name="curso" id="curso" style="margin-left: 10px;">
            <option value="">-- Seleccionar --</option>
            <option value="IPC2">IPC2</option>
            <option value="EDD">EDD</option>
        </select>

        <button type="submit" style="margin-left: 10px;">
            Generar
        </button>

        <button type="button" style="margin-left: 10px;">
            Generar PDF
        </button>
    </div>
</form>

{% if mostrar %}
    <div style="border: 1px solid #ccc; padding: 20px;">
        <h3>Reporte generado</h3>

        <div style="
            height: 250px;
            background-color: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
        ">
            <p>[ Aquí se mostrará el reporte generado con Graphviz ]</p>
        </div>
    </div>
{% endif %}

{% endblock %}
