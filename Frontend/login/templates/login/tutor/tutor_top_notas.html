{% extends 'login/tutor/base_tutor.html' %}

{% block title %}Top Notas por Actividad{% endblock %}

{% block content %}

<h2>REVISIÓN DE REPORTE NOTAS POR ACTIVIDAD</h2>

<form method="post">
    {% csrf_token %}

    <div style="margin-bottom: 20px;">
        <label><strong>Curso:</strong></label>
        <select name="curso" style="margin-left: 10px;">
            <option value="">-- Seleccionar --</option>
            <option value="IPC2">IPC2</option>
            <option value="EDD">EDD</option>
        </select>

        <label style="margin-left: 20px;"><strong>Actividad:</strong></label>
        <select name="actividad" style="margin-left: 10px;">
            <option value="">-- Seleccionar --</option>
            <option value="Tarea 1">Tarea 1</option>
            <option value="Examen 1">Examen 1</option>
        </select>

        <button type="submit" style="margin-left: 20px;">Generar</button>
        <button type="button" style="margin-left: 10px;">Generar PDF</button>
    </div>
</form>

{% if mostrar %}
    <div style="border: 1px solid #ccc; padding: 20px;">
        <h3>Reporte Top Notas</h3>

        <div style="
            height: 250px;
            background-color: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
        ">
            <p>[ Aquí se mostrará el reporte generado con Graphviz ]</p>
        </div>
    </div>
{% endif %}

{% endblock %}
