<!DOCTYPE html>
<html lang="es">
    {% load static %}
<head>
    <meta charset="UTF-8">
    <title>Página de Bienvenida</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #142752, #859398);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .hero {
            width: 100%;
            max-width: 1100px;
            padding: 40px;
            display: grid;
            grid-template-columns: 1.1fr 0.9fr;
            gap: 30px;
            align-items: center;
        }
        .hero-text {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .hero-text h1 {
            font-size: 3rem;
            margin: 0;
        }
        .hero-text p {
            font-size: 1.1rem;
            line-height: 1.6;
            max-width: 540px;
        }
        .hero-text a {
            width: fit-content;
            margin-top: 20px;
            padding: 16px 28px;
            background: #1abc9c;
            color: #0d1f23;
            text-decoration: none;
            font-weight: bold;
            border-radius: 10px;
            transition: transform 0.2s ease, background 0.2s ease;
        }
        .hero-text a:hover {
            transform: translateY(-2px);
            background: #16a085;
        }
        .hero-image {
            display: grid;
            gap: 18px;
        }
        .hero-image img {
            width: 100%;
            border-radius: 22px;
            object-fit: cover;
            min-height: 170px;
        }
        .hero-image .top {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px;
        }
        @media (max-width: 900px) {
            .hero {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <section class="hero">
        <div class="hero-text">
            <h1>¡Bienvenido a AcadNet!</h1>
            <p>Ingresa con tu usuario, explora, vive y disfruta nuestra plataforma de gestión académica. Desde aquí podrás iniciar
                 sesión y comenzar tu ruta como estudiante, tutor o administrador.</p>
            <a href="/login/">Ir a Iniciar Sesión</a>
        </div>
        <div class="hero-image">
            <div class="top">
                <img src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f?auto=format&fit=crop&w=800&q=80" alt="Educación Digital">
                <img src="https://images.unsplash.com/photo-1516321318423-f06f85e504b3?auto=format&fit=crop&w=800&q=80" alt="Aprendizaje Online">
            </div>
            <img  src="{% static 'Imagenes/logo.jpg' %}" alt="Logo">
        </div>
    </section>
</body>
</html>
