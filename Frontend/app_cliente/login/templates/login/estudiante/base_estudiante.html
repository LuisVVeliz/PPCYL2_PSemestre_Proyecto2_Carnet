<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Estudiante{% endblock %}</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f4f4f4;
        }
        .container {
            padding: 30px;
            background-color: white;
            min-height: 100vh;
        }
        h2 { margin-top: 0; }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid #ccc;
            padding: 10px;
            text-align: left;
        }
        th { background-color: #e0e0e0; }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        a {
            text-decoration: none;
            color: #2d3e50;
            font-weight: bold;
        }
        .error { color: #b00020; }
    </style>
</head>
<body>

<div class="container">
    <div class="top-bar">
        <h2>{% block header %}{% endblock %}</h2>
        <a href="{% url 'logout' %}">Cerrar sesion</a>
    </div>

    {% block content %}{% endblock %}
</div>

</body>
</html>
