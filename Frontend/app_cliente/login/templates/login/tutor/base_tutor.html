<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Tutor{% endblock %}</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f4f4f4;
        }
        .container {
            display: flex;
            min-height: 100vh;
        }
        .sidebar {
            width: 230px;
            background-color: #2d3e50;
            color: white;
            padding: 20px;
        }
        .sidebar h3 {
            text-align: center;
            margin-bottom: 25px;
        }
        .sidebar a {
            display: block;
            color: white;
            padding: 10px;
            text-decoration: none;
            margin-bottom: 5px;
            border-radius: 5px;
        }
        .sidebar a:hover { background-color: #1abc9c; }
        .content {
            flex: 1;
            padding: 30px;
            background-color: #ffffff;
            overflow-y: auto;
        }
        h2 { margin-top: 0; }
        .message { color: green; }
        .error { color: #b00020; }
    </style>
</head>
<body>

<div class="container">
    <div class="sidebar">
        <h3>Tutor</h3>
        <a href="{% url 'tutor_horarios' %}">Horarios</a>
        <a href="{% url 'tutor_notas' %}">Ingreso de Notas</a>
        <a href="{% url 'tutor_reporte_promedio' %}">Reporte Promedios</a>
        <a href="{% url 'tutor_top_notas' %}">Top Notas por Actividad</a>
        <a href="/matriz/">📊 Matriz Dispersa</a>   <!-- ← AGREGAR ESTA LÍNEA -->
        <hr>
        <a href="{% url 'logout' %}">Cerrar sesion</a>
    </div>

    <div class="content">
        {% block content %}{% endblock %}
    </div>
</div>

</body>
</html>
