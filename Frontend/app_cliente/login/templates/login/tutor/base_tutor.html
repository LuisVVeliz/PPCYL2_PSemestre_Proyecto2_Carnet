<!DOCTYPE html>
<html lang="es">
    {% load static %}
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Tutor{% endblock %}</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f4f4f4;
        }
.topbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 110px;
            background: #142752;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .topbar h2 {
            color: white;
            margin: 0;
            padding: 0 100px;
            text-align: center;
            width: 100%;
        }

        .topbar .logo {
            position: absolute;
            top: 1px;
            right: 40px;
            width: 40%;        
            height: auto;
            max-width: 160px;  
            object-fit: contain;
        }
        
        .sidebar {
            width: 240px;
            background: #142752;
            color: white;
            height: calc(100vh - 110px);
            padding: 20px;
            position: fixed;
            top: 110px;
            left: 0;
            overflow-y: auto;
            text-align: center;
            z-index: 99;
        }
        
        .sidebar a {
            font-size: 17px;
            display: block;
            color: white;
            padding: 12px 20px;
            text-decoration: none;
            margin-top: 20px;
            text-align: center;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .sidebar a:hover { 
            background: #1abc9c; 
            transform: translateX(5px);
        }  
        
        /* Scrollbar personalizada para sidebar */
        .sidebar::-webkit-scrollbar {
            width: 5px;
        }
        
        .sidebar::-webkit-scrollbar-track {
            background: #1a3a6e;
        }
        
        .sidebar::-webkit-scrollbar-thumb {
            background: #1abc9c;
            border-radius: 5px;
        }
        
        .avatar {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #fff, #f0f0f0);
            border-radius: 50%;
            margin: 20px auto 15px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
        
        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .sidebar h3 {
            margin: 0 0 20px;
            text-align: center;
            font-size: 1rem;
            font-weight: 500;
            color: #ecf0f1;
            padding: 0 15px;
            word-wrap: break-word;
        }
        
        /* Contenedor principal - ajustado */
        .container {
            margin-left: 270px;
            margin-top: 130px;
            padding: 20px 30px;
            min-height: calc(100vh - 130px);
            background-color: #f0f2f5;
            width: calc(100% - 270px);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="topbar">
        <h2>Panel de Tutor</h2>
        <img class="logo" src="{% static 'Imagenes/logo.png' %}" alt="Logo">
    </div>

    <div class="sidebar">
        <div class="avatar">
            <img src="https://icones.pro/wp-content/uploads/2021/02/icone-utilisateur.png" alt="Usuario">
        </div>
        <h3>{{ request.session.user }}</h3>
        <a href="{% url 'tutor_horarios' %}">Horarios</a>
        <a href="{% url 'tutor_notas' %}">Ingreso de Notas</a>
        <a href="{% url 'tutor_reporte_promedio' %}">Reporte Promedios</a>
        <a href="{% url 'tutor_top_notas' %}">Top Notas por Actividad</a>
        <a href="/matriz/">Matriz Dispersa</a>
        <hr>
        <a href="{% url 'logout' %}">Cerrar sesion</a>
    </div>
    <div class="content">
        {% block content %}{% endblock %}
    </div>
</div>

</body>
</html>
