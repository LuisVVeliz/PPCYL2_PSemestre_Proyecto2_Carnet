<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Revision de Usuarios</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f2f2f2;
        }
        .container {
            display: flex;
            min-height: 100vh;
        }
        .sidebar {
            width: 220px;
            background-color: #2d3e50;
            color: white;
            padding: 20px;
        }
        .sidebar a {
            display: block;
            color: white;
            padding: 10px;
            text-decoration: none;
            margin-bottom: 5px;
        }
        .sidebar a:hover { background-color: #1abc9c; }
        .content {
            flex: 1;
            padding: 30px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: white;
        }
        th, td {
            border: 1px solid #ccc;
            padding: 10px;
            text-align: center;
        }
        th {
            background-color: #34495e;
            color: white;
        }
        .error { color: #b00020; }
    </style>
</head>
<body>

<div class="container">
    <div class="sidebar">
        <h3>Admin</h3>
        <a href="{% url 'cargar_xml' %}">Cargar Archivo</a>
        <a href="{% url 'ver_usuarios' %}">Ver Usuarios</a>
        <a href="{% url 'admin_panel' %}">Volver</a>
    </div>

    <div class="content">
        <h2>REVISION DE USUARIOS</h2>

        {% if error %}
        <p class="error">{{ error }}</p>
        {% endif %}

        <table>
            <tr>
                <th>ID</th>
                <th>Usuario</th>
                <th>Contrasena</th>
            </tr>

            {% for u in usuarios %}
            <tr>
                <td>{{ u.id }}</td>
                <td>{{ u.usuario }}</td>
                <td>{{ u.password }}</td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="3">No hay usuarios registrados</td>
            </tr>
            {% endfor %}
        </table>
    </div>
</div>

</body>
</html>
