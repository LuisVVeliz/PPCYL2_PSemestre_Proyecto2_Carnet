<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Carga de Archivos</title>
    <style>
        body { font-family: Arial, Helvetica, sans-serif; margin: 0; background: #f2f2f2; }
        .sidebar {
            width: 220px;
            background: #2d3e50;
            color: white;
            height: 100vh;
            padding: 20px;
            float: left;
        }
        .sidebar a {
            display: block;
            color: white;
            padding: 10px;
            text-decoration: none;
            margin-bottom: 5px;
        }
        .sidebar a:hover { background: #1abc9c; }
        .content { margin-left: 240px; padding: 30px; }
        textarea {
            width: 100%;
            height: 140px;
            font-family: monospace;
        }
        button { margin-right: 10px; }
        .message { color: green; margin: 15px 0; }
        .error { color: #b00020; margin: 15px 0; }
    </style>
</head>
<body>

<div class="sidebar">
    <h3>Admin</h3>
    <a href="{% url 'cargar_xml' %}">Cargar Archivo</a>
    <a href="{% url 'admin_panel' %}">Volver al Panel</a>
</div>

<div class="content">
    <h2>CARGA DE ARCHIVOS</h2>

    {% if mensaje %}
    <p class="message">{{ mensaje }}</p>
    {% endif %}

    {% if error %}
    <p class="error">{{ error }}</p>
    {% endif %}

    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}

        <input type="file" name="archivo_xml" accept=".xml"><br><br>

        <button type="submit">Cargar Archivo</button>
        <button type="submit" name="procesar">Procesar Datos</button>
        <button type="submit" name="limpiar">Limpiar Datos</button>

        <h3>ENTRADA</h3>
        <textarea name="xml_entrada">{{ xml_entrada }}</textarea>

        <h3>SALIDA</h3>
        <textarea readonly>{{ xml_salida }}</textarea>
    </form>
</div>

</body>
</html>
