<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Informacion</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f2f2f2;
        }
        .container {
            display: flex;
            min-height: 100vh;
        }
        .sidebar {
            width: 220px;
            background-color: #2d3e50;
            color: white;
            padding: 20px;
        }
        .sidebar a {
            display: block;
            color: white;
            padding: 10px;
            text-decoration: none;
            margin-bottom: 5px;
        }
        .sidebar a:hover { background-color: #1abc9c; }
        .content {
            flex: 1;
            padding: 40px;
        }
        .info-card {
            width: 420px;
            background: white;
            border: 1px solid #ccc;
            padding: 20px;
        }
        .info-card p { margin: 10px 0; }
    </style>
</head>
<body>

<div class="container">
    <div class="sidebar">
        <h3>Admin</h3>
        <a href="{% url 'cargar_xml' %}">Cargar Archivo</a>
        <a href="{% url 'ver_usuarios' %}">Ver Usuarios</a>
        <a href="{% url 'informacion' %}">Informacion</a>
        <a href="{% url 'admin_panel' %}">Volver</a>
    </div>

    <div class="content">
        <h2>INFORMACION</h2>

        <div class="info-card">
            <p><strong>Nombre:</strong> {{ nombre_completo }}</p>
            <p><strong>Usuario:</strong> {{ carnet }}</p>
            <p><strong>Documentacion:</strong> {{ documentacion_url }}</p>
        </div>
    </div>
</div>

</body>
</html>
